<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de Notes Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icônes FontAwesome pour un rendu professionnel -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Entête de l'application -->
    <header class="app-header">
        <div class="header-container">
            <div class="brand">
                <i class="fa-solid fa-graduation-cap brand-icon"></i>
                <h1>Carnet de Notes</h1>
            </div>
            
            <div class="controls-bar">
                <div class="control-group">
                    <label for="yearSelect"><i class="fa-solid fa-layer-group"></i> Niveau :</label>
                    <select id="yearSelect" onchange="changerAnnee()"></select>
                    <button onclick="ajouterAnnee()" class="btn btn-outline-light" title="Ajouter un nouveau niveau">
                        <i class="fa-solid fa-plus"></i> Niveau
                    </button>
                </div>

                <div class="control-group">
                    <label for="semesterSelect"><i class="fa-solid fa-calendar-days"></i> Semestre :</label>
                    <select id="semesterSelect" onchange="changerSemestre()">
                        <option value="S1">Semestre 1 (S1)</option>
                        <option value="S2">Semestre 2 (S2)</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <!-- Barre d'outils de Sauvegarde & Réinitialisation -->
    <section class="toolbar">
        <div class="toolbar-container">
            <span class="toolbar-title"><i class="fa-solid fa-floppy-disk"></i> Synchronisation & Sécurité :</span>
            <div class="toolbar-actions">
                <button onclick="sauvegarderFichierDirect()" class="btn btn-secondary" title="Synchroniser avec un fichier local">
                    <i class="fa-solid fa-link"></i> Lier Fichier
                </button>
                <button onclick="exporterJSON()" class="btn btn-secondary" title="Exporter une copie .json">
                    <i class="fa-solid fa-download"></i> Sauvegarder
                </button>
                <button onclick="document.getElementById('importFile').click()" class="btn btn-secondary" title="Restaurer un fichier">
                    <i class="fa-solid fa-file-import"></i> Charger
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importerJSON(event)">

                <!-- Boutons de Réinitialisation (RAZ) -->
                <button onclick="reinitialiserSemestre()" class="btn btn-danger-sm" title="Effacer le semestre en cours">
                    <i class="fa-solid fa-rotate-left"></i> RAZ Semestre
                </button>
                <button onclick="reinitialiserNiveau()" class="btn btn-danger-sm" title="Effacer tout le niveau">
                    <i class="fa-solid fa-trash"></i> RAZ Niveau
                </button>
            </div>
        </div>
    </section>

    <!-- Contenu Principal -->
    <main class="main-container">

        <!-- Formulaire d'ajout de module -->
        <section class="card form-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-folder-plus"></i> Ajouter un Module / Matière</h2>
            </div>
            <div class="card-body">
                <!-- Choix du mode d'entrée -->
                <div class="form-group" style="margin-bottom: 15px;">
                    <label><strong>Mode d'entrée :</strong></label>
                    <div style="display: flex; gap: 20px; margin-top: 5px; flex-wrap: wrap;">
                        <label><input type="radio" name="entryMode" value="notes" checked onchange="basculerModeSaisie('notes')"> Saisie Détaillée (Devoirs + Test Lourd)</label>
                        <label><input type="radio" name="entryMode" value="direct" onchange="basculerModeSaisie('direct')"> Saisie Directe de la Moyenne</label>
                    </div>
                </div>

                <form id="addSubjectForm" onsubmit="ajouterMatiere(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="subjectName">Nom du module :</label>
                            <input type="text" id="subjectName" required placeholder="Ex: Architecture des Ordinateurs">
                        </div>
                        <div class="form-group">
                            <label for="subjectCoef">Coefficient :</label>
                            <input type="number" id="subjectCoef" min="1" step="1" required placeholder="Ex: 2 ou 3">
                        </div>
                    </div>

                    <!-- Champ réservé à la Saisie Directe (caché par défaut) -->
                    <div id="directAvgGroup" class="form-group" style="display: none;">
                        <label for="directAverage">Moyenne obtenue du module (/20) :</label>
                        <input type="number" id="directAverage" min="0" max="20" step="0.01" placeholder="Ex: 13.5">
                    </div>

                    <!-- Options réservées à la Saisie Détaillée -->
                    <div id="notesGroup" class="form-group checkbox-container">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="hasTestLourd" checked>
                            <span class="checkmark"></span>
                            Ce module comporte un Test Lourd (TL)
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fa-solid fa-check"></i> Enregistrer la matière
                    </button>
                </form>
            </div>
        </section>

        <!-- Liste dynamique des matières -->
        <section id="subjectsList" class="subjects-grid">
            <!-- Les matières s'afficheront dynamiquement ici -->
        </section>

        <!-- Section de calcul des moyennes -->
        <section class="card summary-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-chart-line"></i> Résultats & Synthèse</h2>
            </div>
            <div class="card-body text-center">
                <button onclick="calculerMoyennes()" class="btn btn-action">
                    <i class="fa-solid fa-calculator"></i> Calculer les moyennes
                </button>
                
                <div class="results-display">
                    <div class="result-badge">
                        <span class="badge-title">Moyenne du <span id="currentSemesterLabel">Semestre 1</span></span>
                        <div class="badge-value"><span id="semesterAverage">--</span> <small>/ 20</small></div>
                    </div>
                    <div class="result-divider"></div>
                    <div class="result-badge primary">
                        <span class="badge-title">Moyenne Annuelle (S1 + S2)</span>
                        <div class="badge-value"><span id="overallAverage">--</span> <small>/ 20</small></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="app-footer">
        <p>Application de Gestion de Notes &copy; 2026 - Fonctionne 100% Hors-ligne</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
